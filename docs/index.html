<!DOCTYPE html>
<html lang="zh-tw">

  <head>
    <meta charset="utf-8">
    <title>GLSL Playground</title>
    <meta name="description" content="GLSL Playground tool hub">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel='stylesheet' href='styles.css'>
  </head>

  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="pill">Tool Hub</div>
        <div>
          <h1>GLSL PLAY-GROUND</h1>
          <p>小海豹的 GLSL 遊樂場</p>
        </div>

        <nav class="nav" aria-label="工具頁面">
          <button class="nav-btn active" type="button" data-panel="gensolo"><span
              class="nav-no">01</span><span><strong>GenSolo</strong><br><span
                class="meta">單圖基因演算</span></span></button>
          <button class="nav-btn" type="button" data-panel="genmix"><span
              class="nav-no">02</span><span><strong>GenMix</strong><br><span
                class="meta">雙圖基因演算混種</span></span></button>
          <button class="nav-btn" type="button" data-panel="genviewer"><span
              class="nav-no">03</span><span><strong>GenViewer</strong><br><span
                class="meta">預覽演算模型</span></span></button>
          <button class="nav-btn" type="button" data-panel="glsleditor"><span
              class="nav-no">04</span><span><strong>GLSL Editor</strong><br><span
                class="meta">單純 shader 編輯器</span></span></button>
          <button class="nav-btn" type="button" data-panel="tool-blank-a"><span
              class="nav-no">05</span><span><strong>空白工具 05</strong><br><span class="meta">預留頁面</span></span></button>
        </nav>

        <div class="sidebar-foot hint">支援網址 hash，例如 <code>#gensolo</code>、<code>#genmix</code>、<code>#genviewer</code>、<code>#glsleditor</code>、<code>#tool-blank-a</code>。</div>
      </aside>

      <main class="content"></main>
    </div>

    <script src="app-bundle.js"></script>
  </body>

</html>
